<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GoalFlow</title>
  <link rel="manifest" href="%BASE_URL%manifest.json" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GoalFlow" />
  <link rel="icon" href="%BASE_URL%icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="%BASE_URL%icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  </style>
  <script>
    // GitHub Pages SPA routing: 404.html redirects here with ?p=path
    (function() {
      var query = window.location.search;
      if (query.startsWith('?p=')) {
        var path = decodeURIComponent(query.slice(3));
        var base = window.location.pathname.replace(/\/[^\/]*$/, '');
        window.history.replaceState(null, null, base + (path || '/'));
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
  <script>
    // Unregister ALL old service workers permanently
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(keys) {
        keys.forEach(function(k) { caches.delete(k); });
      });
    }
  </script>
</body>
</html>

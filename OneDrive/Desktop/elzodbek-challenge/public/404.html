<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GoalFlow</title>
  <script>
    // GitHub Pages SPA routing
    var path = window.location.pathname;
    var base = '/4-oylik-chalange-men-uchun';
    var rest = path.startsWith(base) ? path.slice(base.length) : path;
    var search = window.location.search;
    window.location.replace(
      window.location.origin + base + '/?p=' + encodeURIComponent(rest + search)
    );
  </script>
</head>
<body></body>
</html>
